# Project configuration for sdlc-studio (merged over templates/config-defaults.yaml).
# Dotted keys are read by scripts via sdlc_md.project_override.

# Pinned to schema v2 explicitly: this repo dogfoods the skill on the v2 schema and must
# not be flipped by any change to the new-project default. v4-line work stays era-gated.
schema_version: 2

provenance:
  # Provenance landed mid-stream (CR0052/CR0057). Artifacts created before the tool
  # stamped were authored by hand; exempt them so `provenance check` judges only new work.
  # The cutoff is a global id-number threshold (idn <= cutoff is exempt); 57 covers every
  # artifact that exists today (max is CR0057). The tool stamps all new artifacts, so the
  # only thing this could miss is a hand-authored future artifact whose type-number is still
  # below 57 - acceptable, since hand-authoring is the path we are steering away from.
  adopt_after: 57
  enforce: false  # advisory (report, do not block) - flip to true to gate on provenance

conformance:
  # Story-scoped conformance is grandfathered forward-only: this repo's delivery is gated by
  # its committed script suite plus the critic + gate, not by per-story verify_ac backfill.
  # 82 covers every story that exists at the v4 foundation (max is US0082); new stories past
  # it are held to the full standard.
  #
  # Briefly raised to 115 at the RUN-01KY03GS close for US0112/US0115, then restored to 82
  # when BG0234 landed: their AC2/AC1 asserted repo-WIDE invariants (zero archival advisories,
  # zero disclosure warnings) as executable checks, so unrelated later growth re-ran them red
  # and un-Doned a shipped story. Both were point-in-time cleanups, so their Verify lines are
  # now `manual` (verified at delivery), which is the honest classification and stops the
  # false un-Done at the source. No standing exemption was needed.
  adopt_after: 82

review:
  # Two-role review gate (RFC0044/CR0323), forward-only from the sprint that built it:
  # units past US0192 clear `critiqued` only with the adversarial pass recorded as
  # evidence AND an independent reviewer-of-record sign-off (critic.py evidence/signoff).
  # Under it, Done means signed off - units hold at Review until the close ceremony.
  two_role_after: 192

engagement_floor:
  # The mechanical engagement floor is grandfathered forward-only, like conformance/provenance.
  # This repo's early bugs/CRs shipped multi-file fixes with no per-unit AC (the delivery gate
  # was the script suite + critic, not a formal AC), so the floor exempts every unit that exists
  # at v4.1 adoption. 238 covers the current maxima (US0119/BG0117/CR0238); any new multi-file
  # story/bug/CR past it must carry an AC, a Verify line, or a linked plan - or a recorded waiver.
  adopt_after: 238

estimator:
  # The coercion check (`retro.py estimator`). BG0136 made `Effort` COMPULSORY at filing, so
  # every unit filed after it had to carry one - and a compulsory estimate from someone who does
  # not want to estimate is a careless estimate, which is worse than none because it looks like
  # data. That hazard is testable, and this is the boundary it is tested across.
  #
  # Going forward NOTHING here is needed: the planner STAMPS the era on every forecast record it
  # writes, and a stamp always beats this declaration. This exists only for the evidence recorded
  # BEFORE the stamp did, and it is a DECLARATION a human made by reading the filing history -
  # never an inference from a commit date, which is when work was COMMITTED, not when the size
  # was written.
  #
  # BG0136 itself and everything before it: voluntary. CR0260 is the last CR filed before the
  # gate landed.
  compulsory_after:
    BG: 136
    CR: 260

# Sprint capacity - this repo's own ceiling, deliberately NOT the shipped default (500,000).
# Measured, not forecast: the last 5-unit sprint cost 642,358 tokens of real subagent spend
# (RETRO0025). The shipped default was derived from a 6-unit sprint that cost 384k, which is
# below what a normal sprint here actually costs - so it would flag almost every batch, and a
# warning that always fires is one an operator learns to scroll past.
#
# 1,000,000 sits just above the WORST measured sprint (RETRO0026: 5 units, 902,503 tokens).
# Raised from 700,000 on 2026-07-14 after that sprint blew straight through it. Two measured
# sprints now: 642,358 and 902,503. The old note said 700,000 sat just above the one sprint we had: a normal batch passes,
# a genuinely oversized one still trips. It is an OPERATOR SETTING, not a fitted constant, and
# it is set here rather than in templates/config-defaults.yaml because 642k is this repo's cost
# with this model and these briefs - another project's units cost something else entirely.
#
# Read it against BG0133: until a forecast is recorded at PLAN TIME, the token half of this
# check is built on an estimator known to under-forecast by ~1.8x, so `within budget` currently
# means less than it appears to.
capacity:
  tokens: 1000000
  minutes: 240
  units: 8

two_backlog:
  enforce: true  # this repo dogfoods the two-backlog workflow; keep the gates on

# The per-commit gate budget (RFC0048 D6). A DECLARATION the operator made against a measured
# baseline, never a fitted constant, and it is recorded WITH that baseline because a ceiling
# without the measurement it was chosen against cannot be reviewed later.
#
# D6's problem statement: without a target number every future guard is individually
# justifiable and the ratchet never stops. That is not hypothetical here - between 19 and 21
# July test_gate.py grew 56.4s -> 72.2s (+28%) while gaining three tests, and nobody noticed,
# because it was under every ceiling the whole time. So the check reports the TREND against the
# dated baseline, not just a pass or fail.
#
# Baseline measured 2026-07-21 after EP0093: 93.1s for a code commit
#   skill-tests 78.1s (was 153.1s) + gate 6.95s (was 35.6s) + guards 8.0s
# The pre-EP0093 figure was 196.7s, so the budget sits below what a commit cost two days ago.
#
# 120s is ~29% headroom: enough to absorb machine variance and normal growth without the lane
# becoming noise that gets scrolled past, tight enough that a jump the size of test_gate.py's
# trips it. ADVISORY ALWAYS - a wall-clock check on a loaded or shared machine must never refuse
# a correct commit, which is the same call D3 made for mutation.
gate_budget:
  seconds: 120
  baseline_seconds: 93.1
  baseline_date: 2026-07-21
