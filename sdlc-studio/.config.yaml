# Project configuration for sdlc-studio (merged over templates/config-defaults.yaml).
# Dotted keys are read by scripts via sdlc_md.project_override.

# Pinned to schema v2 explicitly: this repo dogfoods the skill on the v2 schema and must
# not be flipped by any change to the new-project default. v4-line work stays era-gated.
schema_version: 2

provenance:
  # Provenance landed mid-stream (CR0052/CR0057). Artifacts created before the tool
  # stamped were authored by hand; exempt them so `provenance check` judges only new work.
  # The cutoff is a global id-number threshold (idn <= cutoff is exempt); 57 covers every
  # artifact that exists today (max is CR0057). The tool stamps all new artifacts, so the
  # only thing this could miss is a hand-authored future artifact whose type-number is still
  # below 57 - acceptable, since hand-authoring is the path we are steering away from.
  adopt_after: 57
  enforce: false  # advisory (report, do not block) - flip to true to gate on provenance

conformance:
  # Story-scoped conformance is grandfathered forward-only: this repo's delivery is gated by
  # its committed script suite plus the critic + gate, not by per-story verify_ac backfill.
  # 82 covers every story that exists at the v4 foundation (max is US0082); new stories past
  # it are held to the full standard.
  adopt_after: 82

engagement_floor:
  # The mechanical engagement floor is grandfathered forward-only, like conformance/provenance.
  # This repo's early bugs/CRs shipped multi-file fixes with no per-unit AC (the delivery gate
  # was the script suite + critic, not a formal AC), so the floor exempts every unit that exists
  # at v4.1 adoption. 238 covers the current maxima (US0119/BG0117/CR0238); any new multi-file
  # story/bug/CR past it must carry an AC, a Verify line, or a linked plan - or a recorded waiver.
  adopt_after: 238

# Sprint capacity - this repo's own ceiling, deliberately NOT the shipped default (500,000).
# Measured, not forecast: the last 5-unit sprint cost 642,358 tokens of real subagent spend
# (RETRO0025). The shipped default was derived from a 6-unit sprint that cost 384k, which is
# below what a normal sprint here actually costs - so it would flag almost every batch, and a
# warning that always fires is one an operator learns to scroll past.
#
# 700,000 sits just above the one real 5-unit sprint we have measured: a normal batch passes,
# a genuinely oversized one still trips. It is an OPERATOR SETTING, not a fitted constant, and
# it is set here rather than in templates/config-defaults.yaml because 642k is this repo's cost
# with this model and these briefs - another project's units cost something else entirely.
#
# Read it against BG0133: until a forecast is recorded at PLAN TIME, the token half of this
# check is built on an estimator known to under-forecast by ~1.8x, so `within budget` currently
# means less than it appears to.
capacity:
  tokens: 700000
  minutes: 240
  units: 8
