# SDLC Studio Configuration
# Generated by /sdlc-studio init --detect (brownfield)

project:
  name: sdlc-studio
  type: claude_code_skill
  language: markdown
  secondary_language: python
  framework: claude-code-skill

testing:
  default_approach: tdd
  unit_framework: unittest        # python3 -m unittest discover -s .claude/skills/sdlc-studio/scripts/tests
  docs_linter: markdownlint        # npm run lint
  coverage_targets:
    scripts_unit: 90

documentation:
  style: british
  include_diagrams: true
  diagram_tool: mermaid

quality:
  linter: markdownlint
  type_checker: none
  script_lint: ruff               # for scripts/ (best-practices/python.md)

paths:
  sdlc_root: sdlc-studio
  skill_root: .claude/skills/sdlc-studio
  scripts: .claude/skills/sdlc-studio/scripts
  tests: .claude/skills/sdlc-studio/scripts/tests

# Brownfield note: this repo IS the SDLC Studio skill. The sdlc-studio/ workspace
# below dogfoods the skill against its own source. The skill itself installs to
# ~/.claude/skills/sdlc-studio/ and is the back-port source (see CLAUDE.md).
